<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Seismic Activity Service</title>

    <link rel="stylesheet" href="/static/css/style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""/>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="grid-container">
        <div class="row">
            <div class="col-9 p-0">
                <div id="map-module">
                    <div id="map"></div>
                </div>

                <div id="analysis-module" style="display: none;">
                    <button class="btn btn-secondary ms-3 mt-2" onclick="displayMap()">Back</button>
                
                    <div class="row">
                        <div class="col-6">
                            <canvas id="countChart"></canvas>
                        </div>
                        <div class="col-6">
                            <canvas id="magHistChart"></canvas>
                        </div>
                        <div class="col-6">
                            <canvas id="avgMagChart"></canvas>
                        </div>
                        <div class="col-6">
                            <canvas id="depthHistChart"></canvas>
                        </div>
                        <div class="col-6">
                            <canvas id="avgDepthChart"></canvas>
                        </div>

                        <div class="col-6">
                            <canvas id="scatterChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        
            <div id="filters-panel" class="col-3 p-3 bg-light">

                <h5>Filters</h5>

                <div class="select-row">
                    <label class="mt-2">Max earthquakes:</label>
                    <select id="maxEarthquakes" class="form-control">
                        <option value="100">100</option>
                        <option value="300">300</option>
                        <option value="500">500</option>
                        <option value="1000" selected>1000</option>
                        <option value="2000">2000</option>
                        <option value="3000">3000</option>
                        <option value="5000">5000</option>
                    </select>

                    <label class="mt-2">Select earthquakes mode:</label>
                    <select id="selectMode" class="form-control">
                        <option value="newest">Newest</option>
                        <option value="biggest">Biggest</option>
                    </select>
                </div>

                <div>
                    <label>Min magnitude:</label>
                    <input type="number" id="minMag" class="form-control" value="2.5">
                    <label>Max magnitude:</label>
                    <input type="number" id="maxMag" class="form-control" value="10">
                </div>

                <div>
                    <label>Min depth (km):</label>
                    <input type="number" id="minDepth" class="form-control" value="0">
                    <label>Max depth (km):</label>
                    <input type="number" id="maxDepth" class="form-control" value="1000">
                </div>

                <div>
                    <label>Start date:</label>
                    <input type="date" id="startDate" class="form-control">
                    <label class="mt-2">End date:</label>
                    <input type="date" id="endDate" class="form-control">
                </div>

                <div class="mt-2">
                    <div id="map-buttons">
                        <button class="btn btn-primary" onclick="applyFilter()">Apply</button>
                        <button class="btn btn-secondary" onclick="resetFilters()">Reset</button>
                        <button class="btn btn-primary ms-auto " onclick="displayAnalysis()">Analyze</button>
                    </div>
                    <div id="analysis-buttons" style="display: none;">
                        <button class="btn btn-primary" onclick="displayAnalysis()">Apply</button>
                        <button class="btn btn-secondary" onclick="resetFilters()">Reset</button>
                    </div>
                </div>

                <div id="map-settings">
                    <h5 class="mt-3">Marker Settings</h5>

                    <div>
                        <label>Marker radius:</label>
                        <select id="markerRadius" class="form-control" onchange="updateMarkerSettings()">
                            <option value="1.0">1.0</option>
                            <option value="1.2">1.2</option>
                            <option value="1.4">1.4</option>
                            <option value="1.6" selected>1.6</option>
                            <option value="1.8">1.8</option>
                            <option value="2.0">2.0</option>
                        </select>
                    </div>

                    <div>
                        <label>Fill opacity:</label>
                        <select id="fillOpacity" class="form-control" onchange="updateMarkerSettings()">
                            <option value="0.0">0.0</option>
                            <option value="0.2">0.2</option>
                            <option value="0.4" selected>0.4</option>
                            <option value="0.6">0.6</option>
                            <option value="0.8">0.8</option>
                            <option value="1.0">1.0</option>
                        </select>
                    </div>

                    <h5 class="mt-3">Animation</h5>
                    
                    <button class="btn btn-success" onclick="startAnimation()">Start</button><br>

                    <label class="mt-2">Timeline:</label>
                    <input type="range" id="timeline" class="form-range w-100" min="0" max="100" value="0">
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>

</html>
